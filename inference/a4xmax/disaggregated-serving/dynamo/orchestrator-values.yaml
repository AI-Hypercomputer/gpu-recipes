global:
  grove:
    install: true
    enabled: true
  kai-scheduler:
    install: true
    enabled: true

grove:
  tolerations:
    - key: "kubernetes.io/arch"
      operator: "Equal"
      value: "arm64"
      effect: "NoSchedule"
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"

kai-scheduler:
  global:
    tolerations:
      - key: "kubernetes.io/arch"
        operator: "Equal"
        value: "arm64"
        effect: "NoSchedule"
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
  binder:
    resources:
      limits:
        memory: "1024Mi"
      requests:
        memory: "1024Mi"

nats:
  config:
    jetstream:
      fileStore:
        pvc:
          enabled: false
