workload:
  model: ""
  image: ""
  framework: "trtllm"
  configFile: "serving-args.yaml"
  configPath: "/workload/configs"

secrets:
  ngc:
    secretName: nvcr-secret
  huggingface:
    secretName: hf-token-secret
    secretData:
      token: "hf_api_token"

volumes:
  useGcs: true
  gcsfuse:
    bucketName: ""
    modelPath: ""
  ssdMountPath: "/ssd"
  gcsMounts:
    mountPath: "/data/model"

common:
  namespace: "default"

service:
  type: ClusterIP
  ports:
    frontend: 8000
    worker: 9090

benchmarks:
  experiments:
    - isl: 1024
      osl: 8192
      num_requests: 9216
    - isl: 1024
      osl: 1024
      num_requests: 40960

network:
  subnetworks: []
  gibVersion: us-docker.pkg.dev/gce-ai-infra/gpudirect-gib/nccl-plugin-gib-diagnostic-arm64:v1.0.7
  ncclSettings:
    - name: NCCL_DEBUG
      value: "VERSION"

quantizations:
  - "fp8"
  - "fp4"
