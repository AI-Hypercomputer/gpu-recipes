targetPlatform: "gke"
clusterName: ""
queue: ""

huggingface:
  secretName: "hf-secret"
  secretData:
    token: "hf_api_token"

workload:
  framework: "trtllm"
  gpus: 8
  image: ""
  model:
    name: ""
  configPath: "/workload/configs"
  configFile: "serving-args.yaml"

  benchmarks:
    experiments:
      - isl: 128
        osl: 128
        num_requests: 1000

volumes:
  gcsVolumes: true
  ssdMountPath: "/ssd"
  gcsMounts:
    - bucketName: ""
      mountPath: "/gcs"

gpuPlatformSettings:
  useHostPlugin: false
  ncclPluginImage: "us-docker.pkg.dev/gce-ai-infra/gpudirect-tcpxo/nccl-plugin-gpudirecttcpx-dev:v1.0.15"
  rxdmImage: "us-docker.pkg.dev/gce-ai-infra/gpudirect-tcpxo/tcpgpudmarxd-dev:v1.0.21"
  ncclBuildType: "228"

network:
  hostNetwork: true
  ncclSettings:
    - name: NCCL_DEBUG
      value: "WARN"
  subnetworks: []

trtllm:
  replicaCount: 1
  service:
    type: ClusterIP
    ports:
      http: 8000
  serverArgs:
    max-model-len: 32768
    max-num-seqs: 128
    gpu-memory-utilization: 0.90