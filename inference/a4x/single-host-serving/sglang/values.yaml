# values.yaml
queue: <YOUR_KUEUE_NAME>

huggingface:
  secretName: hf-secret
  secretData:
    token: "hf_api_token"

volumes:
  gcsVolumes: true
  ssdMountPath: "/ssd"
  gcsMounts:
    - bucketName: <YOUR_GCS_BUCKET_NAME>
      mountPath: "/gcs"

service:
  type: ClusterIP
  ports:
    http: 8000

workload:
  # Supported: "Wan-AI/Wan2.2-T2V-A14B-Diffusers" or "Wan-AI/Wan2.2-I2V-A14B-Diffusers"
  model:
    name: "Wan-AI/Wan2.2-T2V-A14B-Diffusers"
  gpus: 4 
  image: "lmsysorg/sglang:latest"
  framework: "sglang"
  configFile: serving-args.yaml
  configPath: /workload/configs
  envs:
    - name: HF_HUB_ENABLE_HF_TRANSFER
      value: "1"
    - name: LAUNCHER_SCRIPT
      value: "/workload/launcher/launch-workload.sh"
    - name: SERVER_ARGS_FILE
      value: "/workload/configs/serving-args.yaml"
    - name: HF_HOME
      value: "/ssd"
  # extraArgs left empty as launch-workload.sh now handles TP dynamically
  extraArgs: []

network:
  subnetworks:
    - default
    - gvnic-1
    - rdma-0
    - rdma-1
    - rdma-2
    - rdma-3

tolerations:
  - key: "kubernetes.io/arch"
    operator: "Equal"
    value: "arm64"
    effect: "NoSchedule"
