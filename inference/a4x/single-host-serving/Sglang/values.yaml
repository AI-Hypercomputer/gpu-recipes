queue: tas-cq  # Updated to the typical A4X queue name from your lead's patch

dwsSettings:
  maxRunDurationSeconds:

huggingface:
  secretName: hf-secret
  secretData:
    token: "hf_api_token"

volumes:
  gcsVolumes: true
  ssdMountPath: "/ssd"
  gcsMounts:
    - bucketName: chaitanyapk-supercomputer-logs # Added your verified bucket
      mountPath: "/gcs"

service:
  type: ClusterIP
  ports:
    http: 8000

workload:
  model:
    name: "Wan-AI/Wan2.2-T2V-A14B-Diffusers" # Updated for Wan2.2
  gpus: 4  # Matches your A4X (4-GPU) Baker topology
  image: "lmsysorg/sglang:latest" # Using the verified image that fixes kernel crashes
  framework: "sglang"
  configFile: serving-args.yaml
  configPath: /workload/configs
  envs:
    - name: HF_HUB_ENABLE_HF_TRANSFER
      value: "1"
    - name: LAUNCHER_SCRIPT
      value: "/workload/launcher/launch-workload.sh"
    - name: SERVER_ARGS_FILE
      value: "/workload/configs/serving-args.yaml"
    - name: HF_HOME
      value: "/ssd"
    - name: LD_LIBRARY_PATH
      value: "/usr/local/nvidia/lib64:/usr/local/lib/"
  # Added these to support Wan2.2 MoE and Blackwell architecture
  extraArgs: [
    "--tp", "4",
    "--trust-remote-code", 
  ]

network:
  subnetworks: # Fixed the bracket syntax from your lead's patch
    - default
    - gvnic-1
    - rdma-0
    - rdma-1
    - rdma-2
    - rdma-3
  # Removed gibVersion per lead's advice (it can cause crashes on ARM)
  ncclSettings:
    - name: NCCL_DEBUG
      value: "WARN"

# Added ARM64 toleration to ensure it schedules on Blackwell nodes
tolerations:
  - key: "kubernetes.io/arch"
    operator: "Equal"
    value: "arm64"
    effect: "NoSchedule"
