{{ $nodes := div .Values.workload.gpus 8 | max 1 }}
{{ $gpusPerNode := min .Values.workload.gpus 8 }}

{{ $root := . }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}"
  namespace: default
  labels:
    app: {{ .Release.Name }}-serving
    {{- if $root.Values.queue }}
    kueue.x-k8s.io/queue-name: "{{ $root.Values.queue }}"
    {{- end }}
spec:
  replicas: {{ $nodes }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-serving
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-serving
      annotations:
        kubectl.kubernetes.io/default-container: serving
        {{- if $root.Values.volumes.gcsVolumes }}
        gke-gcsfuse/volumes: "true"
        gke-gcsfuse/cpu-limit: "0"
        gke-gcsfuse/memory-limit: "0"
        gke-gcsfuse/ephemeral-storage-limit: "0"
        {{- end }}
        {{- if and $root.Values.queue $root.Values.dwsSettings.maxRunDurationSeconds }}
        provreq.kueue.x-k8s.io/maxRunDurationSeconds: "{{ $root.Values.dwsSettings.maxRunDurationSeconds }}"
        {{- end }}
        # MANDATORY: Trigger NRI to inject device handles
        nri.device-injector.google.com/inject: "all"
        {{- if not $root.Values.network.hostNetwork }}
        networking.gke.io/default-interface: "eth0"
        networking.gke.io/interfaces: |
        {{- if $root.Values.network.subnetworks }}
          [
            {{- range $i, $subnetwork := $root.Values.network.subnetworks }}
            {"interfaceName":"eth{{ $i }}","network":"{{ $subnetwork }}"}{{ eq $i 9 | ternary "" ","}}
            {{- end }}
          ]
        {{- else }}
          [
            {"interfaceName":"eth0","network":"default"},
            {"interfaceName":"eth1","network":"gvnic-1"},
            {{- range  $i := until 8 }}
            {"interfaceName":"eth{{ add 2 $i }}","network":"pr-a3mega-gpunet-{{ $i }}"}{{ eq $i 7 | ternary "" ","}}
            {{- end }}
          ]
        {{- end }}
        {{- end }}
    spec:
      {{- if $root.Values.network.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      subdomain: "{{.Release.Name}}"
      restartPolicy: Always
      {{- if $root.Values.targetNodes }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
                {{ range $hostname := $root.Values.targetNodes }}
                - {{ $hostname }}
                {{ end }}
      {{- end }}
      tolerations:
      - operator: "Exists"
        key: nvidia.com/gpu
      - operator: "Exists"
        key: cloud.google.com/impending-node-termination
      volumes:
        - name: gib
          emptyDir: {}
        # FIX: Mount Host Paths to allow the container to load kernel modules and see /dev
        - name: dev-infiniband
          hostPath:
            path: /dev/infiniband
        - name: tcpxo-run
          hostPath:
            path: /run/tcpxo
        - name: host-bin-nvidia
          hostPath:
            path: /home/kubernetes/bin/nvidia
        - name: serving-configuration
          configMap:
            name: "{{.Release.Name}}-config"
            items:
            - key: serving-configuration
              path: {{ $root.Values.workload.configFile | default "serving-args" }}
        - name: serving-launcher
          configMap:
            name: "{{.Release.Name}}-launcher"
            defaultMode: 0555
        - name: shared-memory
          emptyDir:
            medium: "Memory"
            sizeLimit: 512Gi
        {{- range $gcs := $root.Values.volumes.gcsMounts }}
        - name: "{{ $gcs.bucketName }}"
          csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: "{{ $gcs.bucketName }}"
              {{- if $gcs.mountOptions }}
              mountOptions: "{{ $gcs.mountOptions }}"
              {{- end }}
        {{- end }}
        {{- if $root.Values.volumes.ssdMountPath }}
        - name: local-ssd
          hostPath:
            path: /mnt/stateful_partition/kube-ephemeral-ssd
        {{- end }}

      initContainers:
      - name: nccl-plugin-installer
        image: {{ $root.Values.network.gibVersion | default "us-docker.pkg.dev/gce-ai-infra/gpudirect-gib/nccl-plugin-gib:v1.1.1" }}
        imagePullPolicy: Always
        command:
        - /bin/sh
        - -c
        args:
        - |
          set -ex
          mkdir -p /target/usr/local/gib/lib64
          if [ -f "/scripts/container_entry.sh" ]; then
            /scripts/container_entry.sh install --install-nccl
          fi
          cp -v -R /var/lib/gib/lib64/. /target/usr/local/gib/lib64
          cp -v -R /var/lib/gib/. /target/usr/local/gib
        volumeMounts:
        - mountPath: /target/usr/local/gib
          name: gib

      containers:
        {{- if $root.Values.workload.gcsSidecarImage }}
        - name: gke-gcsfuse-sidecar
          image: {{ $root.Values.workload.gcsSidecarImage }}
        - name: gke-gcsfuse-metadata-prefetch
          image: {{ $root.Values.workload.gcsSidecarImage }}
        {{- end }}
        - name: serving
          image: "{{ $root.Values.workload.image }}"
          imagePullPolicy: Always
          securityContext:
            privileged: true
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: "{{ $root.Values.huggingface.secretName }}"
                  key: "{{ $root.Values.huggingface.secretData.token }}"
            {{- if $root.Values.network.ncclSettings }}
            {{- toYaml .Values.network.ncclSettings | nindent 12 }}
            {{- end }}
            - name: NCCL_PLUGIN_PATH
              value: /usr/local/gib/lib64
            - name: LD_LIBRARY_PATH
              value: "/usr/local/gib/lib64:/usr/local/nvidia/lib64:/usr/local/lib/python3.12/dist-packages/torch/lib:/usr/local/lib/python3.12/dist-packages/torch_tensorrt/lib:/usr/local/cuda/compat/lib:/usr/local/cuda/lib64:/usr/local/tensorrt/lib"
            - name: NCCL_P2P_DISABLE
              value: "1"
            - name: NCCL_IB_DISABLE
              value: "0"
            - name: NCCL_NET_GDR_LEVEL
              value: "PIX"
            - name: NCCL_CROSS_NIC
              value: "0"
            {{- if $root.Values.network.gibVersion }}
            - name: NCCL_INIT_SCRIPT
              value: "/usr/local/gib/scripts/set_nccl_env.sh"
            {{- end }}
            - name: MODEL_NAME
              value: "{{ $root.Values.workload.model.name }}"
            - name: MODEL_DOWNLOAD_DIR
              value: "{{ $root.Values.volumes.ssdMountPath }}/{{ $root.Values.workload.model.name }}"
            - name: TRTLLM_DIR
              value: "/app/tensorrt_llm"
            {{- if $root.Values.workload.envs }}
            {{- toYaml .Values.workload.envs | nindent 12 }}
            {{- end }}

          workingDir: /workload
          command: ["/bin/bash", "-c"]
          args:
            - |
              #!/bin/bash
              set -ex

              # --- DEEP HARDWARE DISCOVERY & PCI BINDING FIX ---
              echo "Attempting Deep Driver Initialization..."
              
              # 1. Manually find and load the driver from the GKE driver path on the host
              # We use the mounted host-bin-nvidia volume (/host-nvidia)
              find /host-nvidia -name "tcpxo.ko" -exec insmod {} \; || echo "Driver already loaded or not found."

              # 2. Bind the 8 Fabric Controllers (Device 0084) to the tcpxo driver
              for dev in $(lspci -d 1ae0:0084 | cut -d' ' -f1); do
                PCI_ADDR="0000:$dev"
                if [ -d "/sys/bus/pci/drivers/tcpxo" ]; then
                  if [ ! -e "/sys/bus/pci/drivers/tcpxo/$PCI_ADDR" ]; then
                    echo "Binding $PCI_ADDR to tcpxo driver..."
                    echo "$PCI_ADDR" > /sys/bus/pci/drivers/tcpxo/bind || true
                  else
                    echo "$PCI_ADDR already bound."
                  fi
                else
                  echo "CRITICAL: tcpxo driver directory not found in sysfs."
                fi
              done

              echo "Verifying Hardware Handles (Goal: uverbs0-7):"
              ls -l /dev/infiniband/ || echo "/dev/infiniband not found"
              # --- END OF FIX ---

              if [[ -n "${NCCL_INIT_SCRIPT}" ]]; then
                echo "Running NCCL init script: ${NCCL_INIT_SCRIPT}"
                source ${NCCL_INIT_SCRIPT}
                env | grep NCCL
                ldconfig
              fi

              if [ ! -f "$LAUNCHER_SCRIPT" ]; then
                echo "Error: Launcher script $LAUNCHER_SCRIPT not found!"
                exit 1
              fi

              ARGS=()
              if [ -f "/workload/configs/serving-args.yaml" ]; then
                echo "Loading server arguments from ConfigMap"
                while IFS=': ' read -r key value || [ -n "$key" ]; do
                  [[ -z "$key" || "$key" == \#* ]] && continue
                  key=$(echo "$key" | xargs)
                  value=$(echo "$value" | xargs)
                  if [ -n "$key" ]; then
                    if [[ "$value" == "true" ]]; then
                      ARGS+=("--$key")
                    elif [[ "$value" == "false" ]]; then
                      ARGS+=("--$key" "false")
                    elif [ -n "$value" ]; then
                      ARGS+=("--$key" "$value")
                    else
                      ARGS+=("--$key")
                    fi
                  fi
                done < "/workload/configs/serving-args.yaml"
              fi

              {{ if eq $root.Values.workload.framework "trtllm" }}
              {{- range $root.Values.workload.benchmarks.experiments }}
              echo "Running benchmark: $LAUNCHER_SCRIPT"
              bash "$LAUNCHER_SCRIPT" --model_name "$MODEL_NAME" --isl {{ .isl }} --osl {{ .osl }} --num_requests {{ .num_requests }} -- "${ARGS[@]}"
              {{- end }}
              {{ else }}
              bash "$LAUNCHER_SCRIPT" "${ARGS[@]}"
              {{ end }}

          volumeMounts:
            - name: gib
              mountPath: /usr/local/gib
            - name: dev-infiniband
              mountPath: /dev/infiniband
            - name: tcpxo-run
              mountPath: /run/tcpxo
            - name: host-bin-nvidia
              mountPath: /host-nvidia
            - name: serving-configuration
              mountPath: /workload/configs/serving-args.yaml
              subPath: {{ $root.Values.workload.configFile | default "serving-args" }}
            - name: serving-launcher
              mountPath: /workload/launcher
            - name: shared-memory
              mountPath: /dev/shm
            {{- range $gcs := $root.Values.volumes.gcsMounts }}
            - name: "{{ $gcs.bucketName }}"
              mountPath: "{{ $gcs.mountPath }}"
            {{- end }}
            {{- if $root.Values.volumes.ssdMountPath }}
            - name: local-ssd
              mountPath: "{{ $root.Values.volumes.ssdMountPath }}"
            {{- end }}

          resources:
            requests:
              nvidia.com/gpu: {{ $gpusPerNode }}
            limits:
              nvidia.com/gpu: {{ $gpusPerNode }}
