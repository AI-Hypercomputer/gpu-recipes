# Optimization for Wan2.2-T2V-A14B on A4X (4-GPU Blackwell)
tp: 4
trust-remote-code: true

# Video Diffusion Specific Parallelism
ulysses-degree: 2
ring-degree: 2

# Memory & Offloading Strategy (Leveraging Grace-Blackwell NVLink)
text-encoder-cpu-offload: true
vae-cpu-offload: false
dit-cpu-offload: false
dit-layerwise-offload: false

# Performance Tuning
attention-backend: flashinfer
mem-fraction-static: 0.9
port: 8000
