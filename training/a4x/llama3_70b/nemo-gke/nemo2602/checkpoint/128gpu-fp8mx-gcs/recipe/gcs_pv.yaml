apiVersion: v1
kind: PersistentVolume
metadata:
  name: a4x-storage-data-pv
spec:
  accessModes:
  - ReadWriteMany
  capacity:
    storage: 2048Gi
  persistentVolumeReclaimPolicy: Retain
  storageClassName: gcsfuse-sc # dummy storage class
  claimRef:
    namespace: default
    name: a4x-storage-data-pvc
  mountOptions:
  # Mount options based on https://github.com/GoogleCloudPlatform/gcsfuse/blob/master/samples/gcsfuse_config/gpu/config_file/training.yaml
  - implicit-dirs                       # Create implicit directories locally when accessed
  - metadata-cache:negative-ttl-secs:0  # Disable caching for lookups of files/dirs that don't exist
  - metadata-cache:ttl-secs:-1          # Keep cached metadata (file attributes, types) indefinitely time-wise
  - metadata-cache:stat-cache-max-size-mb:-1 # Allow unlimited size for the file attribute (stat) cache
  - metadata-cache:type-cache-max-size-mb:-1 # Allow unlimited size for the file/directory type cache
  csi:
    driver: gcsfuse.csi.storage.gke.io
    volumeHandle: <DL_BUCKET_NAME> # unique bucket name
    volumeAttributes:
      skipCSIBucketAccessCheck: "true"
      gcsfuseMetadataPrefetchOnMount: "true"
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: a4x-storage-ckpt-pv
spec:
  accessModes:
  - ReadWriteMany
  capacity:
    storage: 2048Gi
  persistentVolumeReclaimPolicy: Retain
  storageClassName: gcsfuse-sc # dummy storage class
  claimRef:
    namespace: default
    name: a4x-storage-ckpt-pvc
  mountOptions:
  - implicit-dirs                       # Create implicit directories locally when accessed
  - metadata-cache:negative-ttl-secs:0  # Disable caching for lookups of files/dirs that don't exist
  - metadata-cache:ttl-secs:-1          # Keep cached metadata (file attributes, types) indefinitely time-wise
  - metadata-cache:stat-cache-max-size-mb:-1 # Allow unlimited size for the file attribute (stat) cache
  - metadata-cache:type-cache-max-size-mb:-1 # Allow unlimited size for the file/directory type cache
  - write:enable-streaming-writes:true  # Enable streaming writes
  - write:global-max-blocks:-1          # Allow unlimited number of blocks to be written in parallel
  - file-cache:max-size-mb:-1           # Allow unlimited size for the file cache
  - file-cache:cache-file-for-range-read:true # Enable caching for range reads
  - file-cache:enable-parallel-downloads:true # Enable parallel downloads for the file cache
  # This workaround is for gcsfuse v3.5.0 and below versions.
  # Earlier GCSFuse versions do not recognize a4-highgpu-8g as a high-performance machine.
  # Setting machine-type to a3-highgpu-8g increases the global-max-block, which is
  # crucial for streaming writes. Without a higher global-max-block, streaming writes
  # would fall back to staged writes, resulting in slower write performance.
  # For gcsfuse v3.5.0 and later, `machine-type:a3-highgpu-8g` can be commented out.
  - machine-type:a4x-highgpu-8g
  csi:
    driver: gcsfuse.csi.storage.gke.io
    volumeHandle: <CKPT_BUCKET_NAME> # unique bucket name
    volumeAttributes:
      skipCSIBucketAccessCheck: "true"
      gcsfuseMetadataPrefetchOnMount: "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: a4x-storage-data-pvc
  namespace: default
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 2048Gi
  volumeName: a4x-storage-data-pv
  storageClassName: gcsfuse-sc # dummy storage class
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: a4x-storage-ckpt-pvc
  namespace: default
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 2048Gi
  volumeName: a4x-storage-ckpt-pv
  storageClassName: gcsfuse-sc # dummy storage class